name: 'SpecRoster Coverage Snapshot'
description: >
  Run the full suite with per-test coverage and upload the snapshot
  SpecRoster's Blast Radius selection resolves against. Intended for a
  nightly schedule (and the full-suite safety-net run).

inputs:
  api-url:
    description: 'SpecRoster API base URL'
    required: true
  runner:
    description: 'Test runner: pytest, gotest, dotnet, jest, junit, rspec, cargo, or phpunit'
    required: false
    default: 'pytest'
  pytest-args:
    description: 'Extra arguments passed to pytest (pytest only)'
    required: false
    default: ''
  collect-cmd:
    description: 'Command that runs the consolidated SpecRoster collector (all runners)'
    required: false
    default: 'specroster-collect'
  test-project:
    description: 'Test project directory (dotnet only; empty = auto-discover all test projects)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Full suite with per-test coverage
      shell: bash
      env:
        RUNNER: ${{ inputs.runner }}
        COLLECT_CMD: ${{ inputs.collect-cmd }}
        TEST_PROJECT: ${{ inputs.test-project }}
        PYTEST_ARGS: ${{ inputs.pytest-args }}
      run: |
        set -euo pipefail
        # One uniform invocation for every runner. The per-runner logic
        # (which native tool to drive, which flags apply) lives in the
        # collector's tested Go dispatch, not in this shell. Runner-
        # irrelevant flags are ignored by the binary.
        $COLLECT_CMD -runner "$RUNNER" \
          -project "$TEST_PROJECT" \
          -pytest-args "$PYTEST_ARGS" \
          -o /tmp/tr_coverage.json -collected /tmp/tr_collected.txt

    - name: Upload snapshot
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
        RUNNER: ${{ inputs.runner }}
      run: |
        set -euo pipefail
        OIDC=$(curl -sSf -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=specroster" | jq -r .value)
        TR_TOKEN=$(curl -sSf -X POST "$API_URL/api/v1/token" \
          -H 'Content-Type: application/json' \
          -d "$(jq -n --arg t "$OIDC" '{oidc_token: $t}')" | jq -r .token)
        echo "::add-mask::$TR_TOKEN"
        curl -sSf -X POST "$API_URL/api/v1/coverage" \
          -H "Authorization: Bearer $TR_TOKEN" \
          -F "head_sha=$GITHUB_SHA" \
          -F "runner=$RUNNER" \
          -F "coverage=@/tmp/tr_coverage.json" \
          -F "collected=@/tmp/tr_collected.txt"
        echo "coverage snapshot uploaded"
